name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Windows
          - os: windows-latest
            arch: amd64
            ext: .exe
          # Linux
          - os: ubuntu-latest
            arch: amd64
            ext: ""
          # macOS Intel
          - os: macos-latest
            arch: amd64
            ext: ""

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: 缓存 Go 模块
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: 下载依赖
        run: go mod download

      - name: 编译
        run: |
          $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "dev" }
          go build -ldflags "-s -w -X main.version=$version" -o CloudflareSpeedTest${{ matrix.ext }} .
        shell: pwsh

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: CloudflareSpeedTest_${{ matrix.os }}_${{ matrix.arch }}
          path: CloudflareSpeedTest${{ matrix.ext }}

  # 打 tag 时自动创建 Release
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 打包产物
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            if [ -f "$name/CloudflareSpeedTest" ]; then
              chmod +x "$name/CloudflareSpeedTest"
            fi
            if command -v zip &>/dev/null; then
              zip -rj "${name}.zip" "$name/"
            else
              apt-get update && apt-get install -y zip
              zip -rj "${name}.zip" "$name/"
            fi
          done

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
