name: Build & Release

on:
  push:
    branches: [master]
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: 编译
        shell: pwsh
        run: |
          $version = "${{ github.ref_type }}" -eq "tag" ? "${{ github.ref_name }}" : "dev"
          go build -ldflags "-s -w -X main.version=$version" -o CloudflareSpeedTest.exe .

      - uses: actions/upload-artifact@v4
        with:
          name: CloudflareSpeedTest
          path: CloudflareSpeedTest.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: CloudflareSpeedTest

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          files: CloudflareSpeedTest.exe
          generate_release_notes: true
