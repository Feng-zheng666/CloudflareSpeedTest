name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:              # ← 加这行
  contents: write         # ← 加这行

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: 编译
        shell: pwsh
        run: |
          $date = Get-Date -Format "yyyyMMdd-HHmmss"
          go build -ldflags "-s -w -X main.version=build.$date" -o CloudflareSpeedTest.exe .

      - uses: actions/upload-artifact@v4
        with:
          name: CloudflareSpeedTest
          path: CloudflareSpeedTest.exe

  release:
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: CloudflareSpeedTest

      - name: 发布到 Releases
        uses: ncipollo/release-action@v1
        with:
          tag: release-${{ github.run_number }}
          name: "开发版 build #${{ github.run_number }}"
          body: 手动编译，下载 CloudflareSpeedTest.exe 直接使用
          artifacts: CloudflareSpeedTest.exe
          makeLatest: true
          allowUpdates: true
          removeArtifacts: false
          omitBodyDuringUpdate: true
