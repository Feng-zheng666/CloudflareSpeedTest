name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: 编译
        run: |
          $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "dev" }
          go build -ldflags "-s -w -X main.version=$version" -o CloudflareSpeedTest.exe .
        shell: pwsh

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: CloudflareSpeedTest_windows
          path: CloudflareSpeedTest.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: CloudflareSpeedTest_windows

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          files: CloudflareSpeedTest.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
