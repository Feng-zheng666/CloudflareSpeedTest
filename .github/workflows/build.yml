name: Build & Release

on:
  push:
    branches: [master]
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: 编译
        shell: pwsh
        run: |
          $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "dev" }
          go build -ldflags "-s -w -X main.version=$version" -o CloudflareSpeedTest.exe .

      - name: 上传到 Actions 缓存
        uses: actions/upload-artifact@v4
        with:
          name: CloudflareSpeedTest_windows
          path: CloudflareSpeedTest.exe

      - name: 发布到 Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('continuous-{0}', github.sha) }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || format('最新编译 #{0}', github.run_number) }}
          body: |
            ## 自动编译
            
            - 提交: ${{ github.sha }}
            - 日期: ${{ github.event.head_commit.timestamp }}
            - 信息: ${{ github.event.head_commit.message }}
            
            **下载 CloudflareSpeedTest.exe 直接运行即可**
          files: CloudflareSpeedTest.exe
          make_latest: ${{ github.ref_type == 'tag' && 'true' || 'false' }}
          prerelease: ${{ github.ref_type != 'tag' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
