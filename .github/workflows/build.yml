name: Build & Release

on:
  push:
    branches: [master]
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: 编译
        shell: pwsh
        run: |
          $version = "${{ github.ref_type }}" -eq "tag" ? "${{ github.ref_name }}" : "dev"
          go build -ldflags "-s -w -X main.version=$version" -o CloudflareSpeedTest.exe .

      - name: 创建/更新 Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || '最新开发版' }}
          body: |
            提交: ${{ github.sha }}
            信息: ${{ github.event.head_commit.message || '自动编译' }}
          artifacts: CloudflareSpeedTest.exe
          artifactContentType: application/octet-stream
          allowUpdates: true
          prerelease: ${{ github.ref_type != 'tag' }}
          makeLatest: ${{ github.ref_type == 'tag' && 'legacy' || 'true' }}
          replacesArtifacts: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
