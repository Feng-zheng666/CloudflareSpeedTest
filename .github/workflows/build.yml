name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: 编译
        shell: pwsh
        run: |
          $date = Get-Date -Format "yyyyMMdd-HHmmss"
          go build -ldflags "-s -w -X main.version=build.$date" -o CloudflareSpeedTest.exe .

      - uses: actions/upload-artifact@v4
        with:
          name: CloudflareSpeedTest
          path: CloudflareSpeedTest.exe

  release:
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: CloudflareSpeedTest

      - name: 发布到 Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_number }}
          name: "开发版 build #${{ github.run_number }}"
          body: 手动编译，下载 CloudflareSpeedTest.exe 直接使用
          files: CloudflareSpeedTest.exe
          make_latest: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
